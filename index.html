<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ravi - 1 Aninho 🦖</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Fredoka',sans-serif;
    background:linear-gradient(
        180deg,
        #7ed6ff 0%,
        #bff3ff 30%,
        #d8ffd6 100%
    );
    overflow-x:hidden;
}

.hero{
    width:100%;
    max-width:900px;
    margin:auto;
    padding:20px;
}

.hero img{
    width:100%;
    display:block;
    border-radius:35px;
    box-shadow:0 20px 50px rgba(0,0,0,.25);
}

.contador-container{
    max-width:900px;
    margin:0 auto 30px auto;
    padding:0 20px;
    text-align:center;
}

.contador-container h2{
    color:#2e7d32;
    margin-bottom:20px;
    font-size:32px;
}

.countdown{
    display:flex;
    justify-content:center;
    gap:15px;
    flex-wrap:wrap;
}

.time-box{
    background:#4caf50;
    color:white;
    padding:18px;
    border-radius:20px;
    min-width:120px;
    box-shadow:0 8px 20px rgba(0,0,0,.15);
}

.time-box span{
    display:block;
    font-size:42px;
    font-weight:bold;
}

.acoes{
    max-width:900px;
    margin:0 auto 50px auto;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:25px;
    padding:0 20px;
}

.botao-img{
    width:100%;
    max-width:500px;
    cursor:pointer;
    transition:all .25s ease;
}

.botao-img:hover{
    transform:scale(1.04);
}

.botao-img:active{
    transform:scale(.98);
}

.music-toggle{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;
    height:70px;
    border:none;
    border-radius:50%;
    background:#ff9800;
    color:white;
    font-size:28px;
    cursor:pointer;
    box-shadow:0 10px 25px rgba(0,0,0,.25);
    z-index:999;
}

.rodape{
    text-align:center;
    padding:20px 20px 50px;
    color:#2e7d32;
    font-size:22px;
    font-weight:600;
}

@media(max-width:700px){

    .contador-container h2{
        font-size:24px;
    }

    .time-box{
        min-width:90px;
        padding:15px;
    }

    .time-box span{
        font-size:30px;
    }

    .music-toggle{
        width:60px;
        height:60px;
        font-size:24px;
    }

}

</style>

</head>

<body>

<audio id="musica" autoplay loop>
    <source src="dinossauro.mp3" type="audio/mpeg">
</audio>

<div class="hero">
    <img src="convite-ravi.png" alt="Convite Ravi">
</div>

<div class="contador-container">

```
<h2>⏳ Falta pouco para a grande aventura!</h2>

<div class="countdown">

    <div class="time-box">
        <span id="dias">0</span>
        Dias
    </div>

    <div class="time-box">
        <span id="horas">0</span>
        Horas
    </div>

    <div class="time-box">
        <span id="minutos">0</span>
        Min
    </div>

    <div class="time-box">
        <span id="segundos">0</span>
        Seg
    </div>

</div>
```

</div>

<div class="acoes">

```
<a
    href="https://wa.me/5514988328950?text=Oi!%20Gostaria%20de%20confirmar%20minha%20presen%C3%A7a%20na%20festinha%20de%201%20ano%20do%20Ravi."
    target="_blank"
    onclick="soltarConfete()">

    <img
        src="confirmar-presenca.png"
        alt="Confirmar Presença"
        class="botao-img">
</a>

<a
    href="https://wa.me/5514988328950?text=Oi!%20N%C3%A3o%20poderei%20ir%20na%20festinha%20de%201%20ano%20do%20Ravi."
    target="_blank">

    <img
        src="nao-posso.png"
        alt="Não Posso Ir"
        class="botao-img">
</a>

<a
    href="https://maps.app.goo.gl/dQEehoNycLWsa6PdA"
    target="_blank">

    <img
        src="localizacao.png"
        alt="Localização"
        class="botao-img">
</a>
```

</div>

<div class="rodape">
🦖 Estamos ansiosos para viver essa aventura com você!
</div>

<button
 class="music-toggle"
 onclick="toggleMusica()"
 title="Tocar ou Pausar Música">

🎵

</button>

<script>

const musica =
document.getElementById("musica");

window.addEventListener("load",()=>{

    musica.play()
    .catch(()=>{

        console.log(
            "Autoplay bloqueado pelo navegador."
        );

    });

});

function toggleMusica(){

    if(musica.paused){

        musica.play();

    }else{

        musica.pause();

    }

}

function soltarConfete(){

    confetti({
        particleCount:250,
        spread:180,
        origin:{y:0.7}
    });

}

const festa =
new Date("2026-07-12T12:30:00");

function atualizar(){

    const agora = new Date();

    const diff = festa - agora;

    const dias =
    Math.floor(diff/(1000*60*60*24));

    const horas =
    Math.floor((diff/(1000*60*60))%24);

    const minutos =
    Math.floor((diff/(1000*60))%60);

    const segundos =
    Math.floor((diff/1000)%60);

    document.getElementById("dias").innerText = dias;
    document.getElementById("horas").innerText = horas;
    document.getElementById("minutos").innerText = minutos;
    document.getElementById("segundos").innerText = segundos;

}

atualizar();

setInterval(
    atualizar,
    1000
);

</script>

</body>
</html>
