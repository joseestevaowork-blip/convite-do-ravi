<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ravi - 1 Aninho 🦖</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:linear-gradient(
        180deg,
        #8fd3f4 0%,
        #d6f5d6 100%
    );

    font-family:Arial, sans-serif;

    min-height:100vh;

    display:flex;
    flex-direction:column;
    align-items:center;
}

.convite-wrapper{

    position:relative;

    width:100%;
    max-width:700px;

    margin-top:10px;
}

.convite-img{

    width:100%;
    display:block;

    border-radius:25px;

    box-shadow:
    0 15px 40px rgba(0,0,0,.25);
}

/* BOTÃO CONFIRMAR */

.btn-confirmar{

    position:absolute;

    width:19%;

    left:28%;

    bottom:13.8%;
}

/* BOTÃO NÃO */

.btn-nao{

    position:absolute;

    width:18%;

    left:52%;

    bottom:13.8%;
}

/* BOTÃO LOCALIZAÇÃO */

.btn-local{

    position:absolute;

    width:20%;

    left:56%;

    bottom:31%;
}

.btn-confirmar img,
.btn-nao img,
.btn-local img{

    width:100%;

    transition:.25s;
}

.btn-confirmar:hover img,
.btn-nao:hover img,
.btn-local:hover img{

    transform:scale(1.05);
}

.contador{

    margin-top:12px;

    text-align:center;

    padding:0 15px
}

.contador h2{

    color:#2e7d32;

    font-size:26px;

    margin-bottom:12px;

    font-weight:700;
}

.countdown{

    display:flex;

    gap:10px;

    flex-wrap:wrap;

    justify-content:center;
}

.time-box{

    background:#4caf50;

    color:white;

    border-radius:18px;

    min-width:80px;

    padding:10px 12px;

    box-shadow:
    0 6px 15px rgba(0,0,0,.12);
}

.time-box span{

    display:block;

    font-size:28px;

    font-weight:700;
}

.music-btn{

    position:fixed;

    right:20px;

    bottom:20px;

    width:65px;

    height:65px;

    border:none;

    border-radius:50%;

    background:#ff9800;

    color:white;

    font-size:26px;

    cursor:pointer;

    box-shadow:
    0 5px 20px rgba(0,0,0,.25);

    z-index:999;
}

.rodape{

    margin:18px 0 30px 0;

    color:#2e7d32;

    font-size:14px;

    font-weight:500;

    text-align:center;

    opacity:.8;
}

@media(max-width:700px){

    .contador h2{

    font-size:18px;
}

.time-box{

    min-width:70px;

    padding:8px;
}

.time-box span{

    font-size:22px;
}

.music-btn{

    width:55px;

    height:55px;

    font-size:22px;
}
    
    .btn-confirmar{

        width:24%;

        left:28%;
    }

    .btn-nao{

        width:24%;

        left:52%;
    }

    .btn-local{

        width:30%;
    }

}

</style>

</head>

<body>

<div style="height:10px;"></div>

<audio id="musica" loop preload="auto">
    <source src="dinossauro.mp3" type="audio/mpeg">
</audio>

<div class="convite-wrapper">

<img
    src="convite-ravi.png"
    class="convite-img">

<a
    class="btn-confirmar"
    href="https://wa.me/5514988328950?text=Oi!%20Gostaria%20de%20confirmar%20minha%20presen%C3%A7a%20na%20festinha%20de%201%20ano%20do%20Ravi."
    target="_blank"
    onclick="soltarConfete()">

    <img
        src="confirmar-presenca.png">
</a>

<a
    class="btn-nao"
    href="https://wa.me/5514988328950?text=Oi!%20N%C3%A3o%20poderei%20ir%20na%20festinha%20de%201%20ano%20do%20Ravi."
    target="_blank">

    <img
        src="nao-posso.png">
</a>

<a
    class="btn-local"
    href="https://maps.app.goo.gl/dQEehoNycLWsa6PdA"
    target="_blank">

    <img
        src="localizacao.png">
</a>

</div>

<div class="contador">

<h2>
    ⏳ Falta pouco para a aventura!
</h2>

<div class="countdown">

    <div class="time-box">
        <span id="dias">0</span>
        Dias
    </div>

    <div class="time-box">
        <span id="horas">0</span>
        Horas
    </div>

    <div class="time-box">
        <span id="minutos">0</span>
        Min
    </div>

    <div class="time-box">
        <span id="segundos">0</span>
        Seg
    </div>

</div>

</div>

<div class="rodape">
Feito com muito carinho para celebrar o primeiro aninho do Ravi 🦖💚
</div>

<button
 class="music-btn"
 onclick="toggleMusica()"
 title="Música">
🔊 </button>

<script>

const musica =
document.getElementById("musica");

window.addEventListener("load",()=>{

    musica.play()
    .catch(()=>{

        console.log(
            "Autoplay bloqueado pelo navegador."
        );

    });

});

function toggleMusica(){

    if(musica.paused){

        musica.play();

        document.querySelector('.music-btn').innerHTML = '🔊';

    }else{

        musica.pause();
        
        document.querySelector('.music-btn').innerHTML = '🔇';

    }

}

function soltarConfete(){

    confetti({

        particleCount:250,

        spread:180,

        origin:{y:0.7}

    });

}

const festa =
new Date("2026-07-12T12:30:00");

function atualizar(){

    const agora =
    new Date();

    const diff =
    festa - agora;

    document.getElementById("dias").innerText =
    Math.floor(diff/(1000*60*60*24));

    document.getElementById("horas").innerText =
    Math.floor((diff/(1000*60*60))%24);

    document.getElementById("minutos").innerText =
    Math.floor((diff/(1000*60))%60);

    document.getElementById("segundos").innerText =
    Math.floor((diff/1000)%60);

}

atualizar();

setInterval(
    atualizar,
    1000
);

</script>

</body>
</html>
